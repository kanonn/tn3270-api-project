server:
  port: 8080

# TN3270 configuration
tn3270:
  host: ${TN3270_HOST:localhost}
  port: ${TN3270_PORT:3270}
  script-port: 4270
  username: HERC01
  password: CUL8TR
  session-timeout: 300000  # 5-minute session timeout (milliseconds)
  charset: japanese-kana   # Japanese EBCDIC charset for s3270
